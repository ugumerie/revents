name: Close Stale Pull Requests

on:
  workflow_dispatch:
    inputs:
      days_stale:
        description: 'Number of days without activity to consider a PR stale'
        required: false
        default: '30'

permissions:
  pull-requests: write
  issues: write

jobs:
  close-stale-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale pull requests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DAYS_STALE: ${{ github.event.inputs.days_stale || '30' }}
        run: |
          COMMENT="This pull request is being closed due to inactivity. It has had no activity for more than ${DAYS_STALE} days and has not been merged or actively maintained. It may be superseded by newer dependency updates or is no longer relevant to the current state of the codebase. If this update is still needed, please open a new pull request. Thank you!"

          CUTOFF_DATE=$(date -d "${DAYS_STALE} days ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Closing PRs with no activity since: ${CUTOFF_DATE}"

          # List all open PRs and filter those older than the cutoff date
          STALE_PRS=$(gh pr list --repo "${REPO}" --state open --json number,title,createdAt,updatedAt \
            --jq "[.[] | select(.updatedAt < \"${CUTOFF_DATE}\") | .number][]")

          if [ -z "$STALE_PRS" ]; then
            echo "No stale pull requests found."
            exit 0
          fi

          echo "Found stale PRs: ${STALE_PRS}"

          for PR_NUMBER in $STALE_PRS; do
            echo "Processing PR #${PR_NUMBER}..."

            PR_TITLE=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json title --jq '.title')
            echo "  Title: ${PR_TITLE}"

            # Add a comment explaining why it's being closed
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "${COMMENT}"
            echo "  Comment added."

            # Close the PR
            gh pr close "${PR_NUMBER}" --repo "${REPO}"
            echo "  PR #${PR_NUMBER} closed."
          done

          echo "Done processing stale pull requests."
